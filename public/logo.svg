<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3CF7"/>
      <stop offset="50%" stop-color="#8B3DFF"/>
      <stop offset="100%" stop-color="#00D9FF"/>
    </linearGradient>

    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B845FF"/>
      <stop offset="100%" stop-color="#2ED8FF"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Ring -->
  <circle
      cx="256"
      cy="256"
      r="220"
      fill="none"
      stroke="url(#ringGradient)"
      stroke-width="8"
      filter="url(#glow)"
  />

  <!-- Pixel Blocks -->
  <g fill="url(#logoGradient)">
      <rect x="135" y="105" width="22" height="22" rx="4"/>
      <rect x="175" y="78" width="30" height="30" rx="5"/>
      <rect x="180" y="132" width="24" height="24" rx="4"/>
      <rect x="140" y="165" width="28" height="28" rx="5"/>
      <rect x="186" y="184" width="30" height="30" rx="5"/>
      <rect x="228" y="145" width="18" height="18" rx="3"/>
      <rect x="220" y="95" width="20" height="20" rx="3"/>
      <rect x="150" y="220" width="24" height="24" rx="4"/>
  </g>

  <!-- Letter P -->
  <path
      fill="url(#logoGradient)"
      filter="url(#glow)"
      d="
      M220 400
      L220 155
      C220 125 240 105 270 105
      L340 105
      C392 105 420 135 420 185
      C420 236 392 265 340 265
      L275 265
      L275 400
      Z

      M275 160
      L335 160
      C355 160 368 171 368 185
      C368 201 355 212 335 212
      L275 212
      Z"/>
</svg>
