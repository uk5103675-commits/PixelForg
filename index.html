<!doctype html>
<html lang="en">
  <head>
    <script>
      // Patch window.fetch descriptor to support environments with read-only/getter-only fetch properties
      try {
        let currentFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          configurable: true,
          enumerable: true,
          get() {
            return currentFetch;
          },
          set(val) {
            currentFetch = val;
          }
        });
      } catch (e) {
        console.warn("Unable to patch window.fetch:", e);
      }
    </script>

  </head>
